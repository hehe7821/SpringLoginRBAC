services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spring_auth
      SPRING_DATASOURCE_USERNAME: spring_auth
      SPRING_DATASOURCE_PASSWORD: spring_auth
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spring-auth-network

  postgres:
    image: postgres:18.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: spring_auth
      POSTGRES_USER: spring_auth
      POSTGRES_PASSWORD: spring_auth
    volumes:
      - postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spring_auth -d spring_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spring-auth-network

  redis:
    image: redis:8.8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spring-auth-network

volumes:
  postgres-18-data:
  redis-data:

networks:
  spring-auth-network:
    driver: bridge
