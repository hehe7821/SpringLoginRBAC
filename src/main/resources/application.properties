spring.application.name=springAuthTemplate-1

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spring_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:spring_auth}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:spring_auth}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-handlers-package=com.metanet.login.global.mybatis
mybatis.configuration.map-underscore-to-camel-case=true

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-a-long-random-value-32-bytes}
app.jwt.access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:900}
app.jwt.refresh-token-validity-seconds=${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
