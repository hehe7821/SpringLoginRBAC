spring.application.name=springAuthTemplate-1

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spring_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:spring_auth}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:spring_auth}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER_NAME:${GMAIL_SMTP_USERNAME:}}
spring.mail.password=${SMTP_PASSWORD:${GMAIL_SMTP_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-a-long-random-value-32-bytes}
app.jwt.access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:900}
app.jwt.refresh-token-validity-seconds=${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}

app.email.verification.from=${EMAIL_VERIFICATION_FROM:${SMTP_USER_NAME:${GMAIL_SMTP_USERNAME:}}}
app.email.verification.code-ttl-seconds=${EMAIL_VERIFICATION_CODE_TTL_SECONDS:300}
app.email.verification.verified-ttl-seconds=${EMAIL_VERIFICATION_VERIFIED_TTL_SECONDS:1800}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id-not-configured}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret-not-configured}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

app.oauth2.authorized-redirect-uri=${OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:3000/oauth2/success}
app.oauth2.failure-redirect-uri=${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:3000/login?error=oauth2}
app.oauth2.login-code-ttl-seconds=${OAUTH2_LOGIN_CODE_TTL_SECONDS:60}
